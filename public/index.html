<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamHub AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-primary: #0a0a0f;
        --bg-secondary: #12121a;
        --bg-tertiary: #1a1a24;
        --border-color: rgba(255, 255, 255, 0.08);
        --text-primary: #ffffff;
        --text-secondary: rgba(255, 255, 255, 0.7);
        --text-muted: rgba(255, 255, 255, 0.4);
        --accent-orange: #f6821f;
        --accent-orange-glow: rgba(246, 130, 31, 0.3);
        --accent-teal: #14b8a6;
        --user-msg-bg: linear-gradient(135deg, #f6821f 0%, #ea580c 100%);
        --assistant-msg-bg: rgba(255, 255, 255, 0.05);
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.06);
      }
        .markdown-bold {
          font-weight: 1800;
          color: #f1e9a1;
        }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        line-height: 1.6;
        color: var(--text-primary);
        background: var(--bg-primary);
        min-height: 100vh;
        overflow: hidden;
      }

      .background-effects {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }

      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.5;
        animation: float 20s ease-in-out infinite;
      }

      .orb-1 {
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(246, 130, 31, 0.3) 0%,
          transparent 70%
        );
        top: -100px;
        right: -100px;
        animation-delay: 0s;
      }

      .orb-2 {
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(20, 184, 166, 0.25) 0%,
          transparent 70%
        );
        bottom: -50px;
        left: -50px;
        animation-delay: -7s;
      }

      .orb-3 {
        width: 250px;
        height: 250px;
        background: radial-gradient(
          circle,
          rgba(246, 130, 31, 0.2) 0%,
          transparent 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation-delay: -14s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        25% {
          transform: translate(30px, -30px) scale(1.05);
        }
        50% {
          transform: translate(-20px, 20px) scale(0.95);
        }
        75% {
          transform: translate(20px, 10px) scale(1.02);
        }
      }

      .app-container {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 900px;
        margin: 0 auto;
        padding: 1rem;
      }

      header {
        text-align: center;
        padding: 1.5rem 1rem;
        border-bottom: 1px solid var(--border-color);
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border-radius: 16px 16px 0 0;
        margin-bottom: 0;
      }

      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
        background: var(--user-msg-bg);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px var(--accent-orange-glow);
      }

      .logo-icon svg {
        width: 24px;
        height: 24px;
        color: white;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #fff 0%, rgba(255, 255, 255, 0.7) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
      }

      .chat-container {
        display: flex;
        flex-direction: column;
        flex: 1;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-top: none;
        border-radius: 0 0 16px 16px;
        overflow: hidden;
        min-height: 0;
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        scrollbar-width: thin;
        scrollbar-color: var(--border-color) transparent;
      }

      .chat-messages::-webkit-scrollbar {
        width: 6px;
      }

      .chat-messages::-webkit-scrollbar-track {
        background: transparent;
      }

      .chat-messages::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 3px;
      }

      .message {
        display: flex;
        gap: 0.75rem;
        max-width: 85%;
        animation: messageIn 0.3s ease-out;
      }

      @keyframes messageIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user-message {
        flex-direction: row-reverse;
        margin-left: auto;
      }

      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .avatar svg {
        width: 20px;
        height: 20px;
      }

      .user-message .avatar {
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        color: white;
      }

      .assistant-message .avatar {
        background: var(--user-msg-bg);
        color: white;
        box-shadow: 0 2px 10px var(--accent-orange-glow);
      }

      .message-content {
        padding: 0.875rem 1rem;
        border-radius: 16px;
        position: relative;
      }

      .message-content strong {
        font-weight: bold; 
        color: #ff8800; /* red example */
      }

      .user-message .message-content {
        background: var(--user-msg-bg);
        color: white;
        border-bottom-right-radius: 4px;
      }

      .assistant-message .message-content {
        background: var(--assistant-msg-bg);
        border: 1px solid var(--glass-border);
        color: var(--text-primary);
        border-bottom-left-radius: 4px;
      }

      .message-content p {
        white-space: pre-wrap;
        margin: 0;
        overflow-wrap: anywhere;
        font-size: 0.9375rem;
        line-height: 1.6;
      }

      .typing-indicator {
        display: none;
        padding: 0 1.5rem 1rem;
      }

      .typing-indicator.visible {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .typing-dots {
        display: flex;
        gap: 4px;
      }

      .typing-dots span {
        width: 8px;
        height: 8px;
        background: var(--accent-orange);
        border-radius: 50%;
        animation: bounce 1.4s ease-in-out infinite;
      }

      .typing-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .typing-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-6px);
        }
      }

      .typing-text {
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      .message-input {
        display: flex;
        align-items: flex-end;
        gap: 0.75rem;
        padding: 1rem 1.5rem 1.5rem;
        background: var(--bg-secondary);
        border-top: 1px solid var(--border-color);
      }

      .input-wrapper {
        flex: 1;
        position: relative;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .input-wrapper:focus-within {
        border-color: var(--accent-orange);
        box-shadow: 0 0 0 3px var(--accent-orange-glow);
      }

      #user-input {
        width: 100%;
        padding: 0.875rem 1rem;
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-family: inherit;
        font-size: 0.9375rem;
        resize: none;
        min-height: 48px;
        max-height: 150px;
        outline: none;
      }

      #user-input::placeholder {
        color: var(--text-muted);
      }

      #send-button {
        width: 48px;
        height: 48px;
        background: var(--user-msg-bg);
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
        box-shadow: 0 4px 15px var(--accent-orange-glow);
      }

      #send-button:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px var(--accent-orange-glow);
      }

      #send-button:active:not(:disabled) {
        transform: translateY(0);
      }

      #send-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      #send-button svg {
        width: 20px;
        height: 20px;
      }

      footer {
        text-align: center;
        padding: 1rem;
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      footer a {
        color: var(--accent-orange);
        text-decoration: none;
        transition: opacity 0.2s;
      }

      footer a:hover {
        opacity: 0.8;
      }

      @media (max-width: 640px) {
        .app-container {
          padding: 0.5rem;
        }

        header {
          padding: 1rem;
          border-radius: 12px 12px 0 0;
        }

        h1 {
          font-size: 1.25rem;
        }

        .chat-container {
          border-radius: 0 0 12px 12px;
        }

        .chat-messages {
          padding: 1rem;
        }

        .message {
          max-width: 90%;
        }

        .message-input {
          padding: 0.75rem 1rem 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="background-effects">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <div class="app-container">
      <div class="chat-container">
        <div id="chat-messages" class="chat-messages">
          <div class="message assistant-message">
            <div class="avatar">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                <path d="M2 17l10 5 10-5" />
                <path d="M2 12l10 5 10-5" />
              </svg>
            </div>
            <div class="message-content">
              <p class="markdown">Hello! I'm **TeamHub AI**. How can I help you today?</p>
              <script>
              /**
               * Replace **text** with <strong class="markdown-bold">text</strong>
               * Works on any element that has the class "markdown".
               */
              document.querySelectorAll('.markdown').forEach(el => {
                // Use a RegExp with the "g" flag to replace *all* occurrences.
                // The pattern:
                //   \*\*          – two literal asterisks
                //   (.+?)         – capture the smallest possible string (lazy)
                //   \*\*          – closing two asterisks
                //   (?!\*)        – make sure we don't match *** (which would be bold+italic in full Markdown)
                const markdownBold = /\*\*(.+?)\*\*(?!\*)/g;

                // Replace the markdown with a <strong> element.
                // Using innerHTML is safe here because we are only inserting our own <strong>.
                // If your source contains user‑generated HTML you should sanitize it first.
                el.innerHTML = el.textContent.replace(markdownBold,
                  '<strong class="markdown-bold">$1</strong>');
              });
            </script>
            </div>
          </div>
        </div>

        <div class="typing-indicator" id="typing-indicator">
          <div class="typing-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <span class="typing-text">AI is thinking...</span>
        </div>

        <div class="message-input">
          <div class="input-wrapper">
            <textarea
              id="user-input"
              placeholder="Type your message..."
              rows="1"
            ></textarea>
          </div>
          <button id="send-button" aria-label="Send message">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>

      <footer>
			Built with <a href="https://teamhub.asia" target="_blank" rel="noopener">TeamHub.asia</a></p>
      </footer>
    </div>

    <script src="chat.js"></script>
  </body>
</html>
